<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Full screen dark background */
        body {
            margin: 0;
            background: #111;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff88;
            font-family: Arial, sans-serif;
        }

        /* Spinner container */
        .spinner-container {
            text-align: center;
        }

        /* Dots for loading animation */
        .dot {
            display: inline-block;
            width: 15px;
            height: 15px;
            margin: 5px;
            background-color: #00ff88;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Loading text */
        .loading-text {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }

        /* Optional overlay glow effect */
        .overlay {
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.2);
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="spinner-container">
    <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
    <div class="loading-text">Loading... <span id="progress">0%</span></div>
</div>

<script>
    // Animate percentage 0 → 100 in 5 seconds
    let progress = 0;
    let progressText = document.getElementById("progress");

    // 5000ms / 100 steps = 50ms per step
    let interval = setInterval(() => {
        progress++;
        progressText.innerText = progress + "%";
        if(progress >= 100){
            clearInterval(interval);
            window.location.href = "result.html"; // Redirect to result page
        }
    }, 50); // 50ms per step → 100 steps = 5 seconds
</script>

</body>
</html>
