<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maintenance Calorie Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="input-page">

<div class="container">
    <h1>🔥 Maintenance Calorie & Macro Calculator</h1>

    <form id="calorieForm" class="form-box">

        <label>Age</label>
        <input type="number" id="age" placeholder="Enter your age" required>

        <label>Gender</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="Enter height in cm" required>

        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter weight in kg" required>

        <label>Activity Level</label>
        <select id="activity">
            <option value="1.2">Sedentary (Little or no exercise)</option>
            <option value="1.375">Lightly Active (1-3 days/week)</option>
            <option value="1.55">Moderately Active (3-5 days/week)</option>
            <option value="1.725">Very Active (6-7 days/week)</option>
            <option value="1.9">Super Active (Athlete)</option>
        </select>

        <button type="submit">Calculate</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
